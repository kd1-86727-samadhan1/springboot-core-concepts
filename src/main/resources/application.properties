spring.application.name=springboot-core-concepts

# ===== SERVER =====
server.port=8080

# ===== H2 DATABASE =====
spring.datasource.url=jdbc:h2:mem:samdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ===== H2 CONSOLE =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

myapp.feature.enabled=true

# Task 3 - Active Profile
spring.profiles.active=dev

# Task 5 - @ConfigurationProperties
app.name=PaymentService
app.version=1.0
app.timeout=5000
# kebab case
app.max-retries=3	
app.base-url=https://api.payment.com

# Task 6 - Nested @ConfigurationProperties
# ===== BASIC =====
payment.enabled=true

# ===== RETRY =====
payment.retry.max-attempts=3
payment.retry.backoff.delay=1000
payment.retry.backoff.multiplier=2.0

# ===== SECURITY =====
payment.security.api-key=secret-key
payment.security.hmac.enabled=true
payment.security.hmac.algorithm=HmacSHA256
